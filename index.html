<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>彰基胸腔內科門診 Google Calendar</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* 設定根元素基礎字體放大 2 倍 (原本預設 16px -> 放大為 32px) */
html {
  font-size: 200%; 
}

/* 將所有解析度下的 body 邊距皆設為 0 */
body{
  margin:0;
  padding:0;
  background:#fff;
  font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
}

/* 卡片滿版貼邊，邊距採用 rem 隨 2 倍基礎字體放大 */
.card{
  width:100%;
  max-width:none;
  margin:0;
  background:#fff;
  border-radius:0;
  box-shadow:none;
  min-height:100vh;
  padding: 1rem max(0.8rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(0.8rem, env(safe-area-inset-left));
}

/* 標題：基於放大後的字體再設定相對比例 */
h2{
  text-align:center;
  color:#1565c0;
  margin:0 0 0.6em;
  font-size: 1.5rem; /* 32px * 1.5 = 48px */
}

/* 標籤文字 */
label{
  display:block;
  margin:0.8em 0 0.3em;
  font-weight:700;
  font-size: 1rem; /* 32px */
}

/* 輸入框、下拉選單、文字區域與按鈕 */
input, select, textarea, button {
  font-size: 1rem; /* 32px */
  padding: 0.6em;
  border-radius: 0.5em;
  font-family: inherit;
}

input, select, textarea {
  width:100%;
  border:1px solid #ccc;
}

textarea{
  min-height: 5em;
}

.quick{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap: 0.5em;
  margin-top: 0.5em;
}

button{
  border:0;
  cursor:pointer;
  transition:.2s;
}

button:active{transform:scale(.97)}

.quick button{background:#43a047;color:#fff}

.today{
  background:#757575;
  color:#fff;
  width:100%;
  margin-top: 0.5em;
}

.mainBtn{
  position:sticky;
  bottom:0.5rem;
  width:100%;
  margin-top: 1.2em;
  background:#1976d2;
  color:#fff;
  font-weight:bold;
  font-size: 1.15rem; /*約 36.8px */
  padding: 0.75em;
}

/* 資訊文字區塊 */
.info{
  font-size: 0.85rem; /*約 27.2px */
  color:#666;
  line-height:1.8;
  margin-top: 1em;
}

@media(max-width:480px){.quick{grid-template-columns:1fr}}

@media(prefers-color-scheme:dark){
  body, .card{background:#222;color:#fff}
  input,select,textarea{background:#333;color:#fff;border-color:#555}
  .info{color:#bbb}
}
</style>
</head>
<body>
<div class="card">
<h2>彰基胸腔內科門診</h2>
<label>日期</label>
<input type="date" id="date">
<button class="today" onclick="todayDate()">今天</button>

<label>快速日期遞延</label>
<div class="quick">
<button onclick="changeDate(7)">+一週</button>
<button onclick="changeDate(28)">+一個月</button>
<button onclick="changeDate(56)">+兩個月</button>
<button onclick="changeDate(84)">+三個月</button>
</div>

<label>門診時段</label>
<select id="session">
<option value="AM">上午 08:30-12:00</option>
<option value="PM">下午 14:00-17:00</option>
<option value="NIGHT">夜間 18:00-21:00</option>
</select>

<label>診間</label>
<input type="number" inputmode="numeric" min="1" max="99" id="room">

<label>備註</label>
<textarea id="note"></textarea>

<button class="mainBtn" onclick="createCalendar()">建立 Google Calendar 活動</button>
<div class="info"><b>活動：</b>彰基胸腔內科門診<br><b>地點：</b>XX診間</div>
</div>

<script>
const room=document.getElementById("room");
if(localStorage.room) room.value=localStorage.room;
todayDate();

function pad(n){return String(n).padStart(2,"0")}
function formatDateInput(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function todayDate(){date.value=formatDateInput(new Date())}
function changeDate(days){
 let d=date.value?new Date(date.value):new Date();
 d.setDate(d.getDate()+days);
 date.value=formatDateInput(d);
}
function calFmt(d){
 return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"T"+pad(d.getHours())+pad(d.getMinutes())+"00";
}
function getClinicTime(base){
 let s=new Date(base),e=new Date(base);
 switch(session.value){
 case "AM":s.setHours(8,30,0);e.setHours(12,0,0);break;
 case "PM":s.setHours(14,0,0);e.setHours(17,0,0);break;
 default:s.setHours(18,0,0);e.setHours(21,0,0);
 }
 return {s,e};
}
function createCalendar(){
 if(!date.value){alert("請選擇日期");return;}
 if(!room.value){alert("請輸入診間");return;}
 localStorage.room=room.value;
 let t=getClinicTime(new Date(date.value));
 let url="https://calendar.google.com/calendar/render?action=TEMPLATE"
 +"&text="+encodeURIComponent("彰基胸腔內科門診")
 +"&dates="+calFmt(t.s)+"/"+calFmt(t.e)
 +"&location="+encodeURIComponent(room.value+"診間")
 +"&details="+encodeURIComponent(note.value);
 window.open(url,"_blank");
}
</script>
</body>
</html>
